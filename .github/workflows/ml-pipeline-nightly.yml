name: ML Pipeline Nightly Retrain

on:
  schedule:
    # 08:00 UTC daily = 02:00 Mountain (MDT) / 01:00 (MST)
    - cron: '0 8 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ml-pipelines

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-pipelines/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: python train.py

      - name: Upload trained models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: models-${{ github.run_number }}
          path: ml-pipelines/models/
          retention-days: 14

      - name: Upload training reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: ml-pipelines/reports/
          retention-days: 30
